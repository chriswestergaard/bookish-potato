<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --text: #1a1814;
      --muted: #6b685f;
      --accent: #2a2420;
      --rule: rgba(0,0,0,0.08);
      --link-hover: #c8602a;
      --tag-bg: #edeae3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141210;
        --surface: #1e1c18;
        --text: #f0ece3;
        --muted: #958f83;
        --accent: #e8e0d0;
        --rule: rgba(255,255,255,0.08);
        --link-hover: #e07848;
        --tag-bg: #27241e;
      }
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      background: var(--surface);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--rule);
    }

    /* ── Photo ── */
    .photo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .photo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--surface);
      box-shadow: 0 0 0 1px var(--rule);
    }

    /* Placeholder shown when no image is loaded */
    .photo-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--tag-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--muted);
      letter-spacing: -0.02em;
    }

    /* ── Name & bio ── */
    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      text-align: center;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .tagline {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 0 0 1.75rem;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    /* ── Link list ── */
    .link-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: var(--tag-bg);
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 400;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .link-item:hover {
      background: var(--accent);
      color: var(--bg);
      transform: translateX(3px);
    }

    .link-item:hover .link-icon svg {
      stroke: var(--bg);
      fill: none;
    }

    .link-item:hover .link-icon svg.filled {
      fill: var(--bg);
    }

    .link-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--text);
      stroke-width: 1.5;
      fill: none;
      transition: stroke 0.15s, fill 0.15s;
    }

    .link-icon svg.filled {
      fill: var(--text);
      stroke: none;
      transition: fill 0.15s;
    }

    .link-label {
      flex: 1;
    }

    .link-sub {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      transition: color 0.15s;
    }

    .link-item:hover .link-sub {
      color: rgba(255,255,255,0.55);
    }

    @media (prefers-color-scheme: dark) {
      .link-item:hover .link-sub {
        color: rgba(20,18,16,0.55);
      }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
  </style>
</head>
